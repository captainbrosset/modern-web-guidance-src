<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Popover Tooltip</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            background-color: #007bff;
            color: white;
            border-radius: 8px;
            font-weight: 500;
            transition: background-color 0.2s;
            /* Anchor name for the tooltip to reference */
            anchor-name: --trigger;
        }

        #tooltip-trigger:hover {
            background-color: #0056b3;
        }

        /* The Tooltip (Popover) */
        #tooltip {
            /* Reset default popover styles */
            margin: 0;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #333;
            color: #fff;
            font-size: 14px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            max-width: 200px;
            
            /* CSS Anchor Positioning */
            position-anchor: --trigger;
            position-area: top;
            position-try-fallbacks: flip-block;
        }

        /* Little arrow using a pseudo-element */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -6px;
            border-width: 6px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }

        #tooltip img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            margin-bottom: 8px;
            display: block;
        }
    </style>
    <!-- Polyfill detection and loading -->
    <script>
        (function() {
            if (!HTMLButtonElement.prototype.hasOwnProperty("interestForElement")) {
                const s = document.createElement("script");
                s.src = "https://unpkg.com/interestfor@1.0.7/src/interestfor.min.js";
                document.head.appendChild(s);
            }
            if (!HTMLElement.prototype.hasOwnProperty("popover")) {
                const s = document.createElement("script");
                s.src = "https://unpkg.com/@oddbird/popover-polyfill@0.6.1/dist/popover.min.js";
                document.head.appendChild(s);
            }
            if (!("positionAnchor" in document.documentElement.style)) {
                const s = document.createElement("script");
                s.src = "https://unpkg.com/@oddbird/css-anchor-positioning@0.8.0/dist/css-anchor-positioning.js";
                document.head.appendChild(s);
            }
        })();
    </script>
</head>
<body>

    <button id="tooltip-trigger" interestfor="tooltip">
        Hover over me
    </button>

    <div id="tooltip" popover="hint">
        <img src="https://images.unsplash.com/photo-1461749280684-dccba630e2f6?auto=format&fit=crop&w=400&q=80" alt="Modern Web Development">
        <strong>Modern Tooltip</strong>
        <p style="margin: 4px 0 0 0;">I'm powered by the Popover API and Interest Invokers!</p>
    </div>

</body>
</html>
