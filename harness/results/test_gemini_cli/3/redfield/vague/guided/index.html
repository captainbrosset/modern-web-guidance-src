<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            anchor-name: --tooltip-trigger;
        }

        /* The Tooltip (using Popover API and Anchor Positioning) */
        #tooltip {
            margin: 0;
            padding: 0; /* Remove padding to let image be flush if desired, or keep it for content */
            border: none;
            border-radius: 8px;
            background-color: #fff;
            color: #333;
            font-size: 14px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            width: 200px;
            overflow: hidden;
            
            /* Positioning */
            position-anchor: --tooltip-trigger;
            position-area: top;
            position-try-fallbacks: flip-block;
        }

        #tooltip img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            display: block;
        }

        #tooltip .content {
            padding: 12px;
        }

        /* Little arrow at the bottom of the tooltip */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 8px;
            border-style: solid;
            border-color: #fff transparent transparent transparent;
        }
    </style>
</head>
<body>

    <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
    
    <div id="tooltip" popover="hint">
        <img src="https://picsum.photos/id/237/200/120" alt="Cute dog">
        <div class="content">
            <strong>Modern Hovercard</strong>
            <p style="margin: 4px 0 0; font-size: 12px; color: #666;">
                Using Popover API, Interest Invokers, and CSS Anchor Positioning.
            </p>
        </div>
    </div>

    <script>
        // Feature detection and conditional polyfill loading
        (async () => {
            const loadScript = (src) => new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });

            const polyfills = [];

            if (!HTMLButtonElement.prototype.hasOwnProperty("interestForElement")) {
                polyfills.push('./lib/interestfor.min.js');
            }
            if (!HTMLElement.prototype.hasOwnProperty("popover")) {
                polyfills.push('./lib/popover.min.js');
            }
            if (!("positionAnchor" in document.documentElement.style)) {
                polyfills.push('./lib/css-anchor-positioning.js');
            }

            for (const src of polyfills) {
                await loadScript(src);
            }
        })();
    </script>

</body>
</html>
