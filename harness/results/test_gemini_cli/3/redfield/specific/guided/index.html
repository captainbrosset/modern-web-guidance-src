<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            anchor-name: --tooltip-trigger;
        }

        /* The Tooltip */
        #tooltip {
            position-anchor: --tooltip-trigger;
            position-area: top;
            position-try-fallbacks: flip-block;
            width: max-content;
            margin-inline: auto;
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: none;
        }

        /* Little arrow at the bottom of the tooltip */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
    </style>
    <!-- Polyfills for modern features -->
    <script type="module">
        // Interest Invokers Polyfill
        if (!HTMLButtonElement.prototype.hasOwnProperty("interestForElement")) {
            import("https://unpkg.com/interestfor@1.0.7/src/interestfor.min.js");
        }
        // Popover API Polyfill
        if (!HTMLElement.prototype.hasOwnProperty("popover")) {
            const script = document.createElement("script");
            script.src = "https://unpkg.com/@oddbird/popover-polyfill@0.6.1/dist/popover.min.js";
            document.head.appendChild(script);
        }
        // Anchor Positioning Polyfill
        if (!("@supports (position-anchor: --foo)" in window)) {
            // Check for positionAnchor support in style
            if (!("positionAnchor" in document.documentElement.style)) {
                import("https://unpkg.com/@oddbird/css-anchor-positioning@0.8.0/dist/css-anchor-positioning.js");
            }
        }
    </script>
</head>
<body>

    <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
    <div id="tooltip" popover="hint">
        <img src="https://picsum.photos/id/237/100/100" alt="A cute black dog" style="display: block; margin-bottom: 8px; border-radius: 4px;">
        I'm a modern tooltip!
    </div>

</body>
</html>
