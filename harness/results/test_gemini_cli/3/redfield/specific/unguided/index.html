<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperative Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            anchor-name: --trigger;
        }

        /* The Tooltip */
        #tooltip {
            margin: 0;
            position-anchor: --trigger;
            position-area: top;
            position-try-fallbacks: flip-block;
            width: 200px; /* Increased width for image */
            background-color: white;
            color: #333;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border: 1px solid #e5e7eb;
        }

        #tooltip img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        /* Little arrow at the bottom of the tooltip */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -8px;
            border-width: 8px;
            border-style: solid;
            border-color: white transparent transparent transparent;
        }

        /* Tooltip arrow shadow/border approximation */
        #tooltip::before {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -9px;
            border-width: 9px;
            border-style: solid;
            border-color: #e5e7eb transparent transparent transparent;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="container">
        <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        <div id="tooltip" popover="hint">
            <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=400&q=80" alt="Coding">
            <strong>Modern Popover</strong>
            <p style="margin: 4px 0 0; color: #666;">This tooltip uses the native Popover API and Interest Invokers.</p>
        </div>
    </div>

    <script>
        // Conditionally load polyfills for modern features
        (function() {
            const polyfills = [];
            if (!HTMLButtonElement.prototype.hasOwnProperty("interestForElement")) {
                polyfills.push("https://unpkg.com/interestfor@1.0.7/src/interestfor.min.js");
            }
            if (!HTMLElement.prototype.hasOwnProperty("popover")) {
                polyfills.push("https://unpkg.com/@oddbird/popover-polyfill@0.6.1/dist/popover.min.js");
            }
            if (!("positionAnchor" in document.documentElement.style)) {
                polyfills.push("https://unpkg.com/@oddbird/css-anchor-positioning@0.8.0/dist/css-anchor-positioning.js");
            }

            polyfills.forEach(src => {
                const script = document.createElement("script");
                script.src = src;
                script.async = false; // Load in order if needed
                document.head.appendChild(script);
            });
        })();
    </script>
</body>
</html>
