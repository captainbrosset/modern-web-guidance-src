<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | The Daily Grind</title>
  <link rel="stylesheet" href="/styles.css">
</head>

<body>

  <nav>
    <div class="logo"><a href="/">THE DAILY GRIND</a></div>
    <ul>
      <li><a href="/menu">Menu</a></li>
      <li><a href="/locations">Locations</a></li>
      <li><a href="/rewards">Rewards</a></li>
      <li><a href="/account">My Account</a></li>
      <li><a href="/logout" class="logout-link">Logout</a></li>
    </ul>
  </nav>

  <div class="page-header">
    <h1>Contact Us</h1>
    <p>We'd love to hear from you.</p>
  </div>

  <main class="container" style="max-width: 700px;">
    <form>
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Your name">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="subject">Subject</label>
        <select id="subject">
          <option>General Inquiry</option>
          <option>Catering</option>
          <option>Careers</option>
          <option>Feedback</option>
        </select>
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" placeholder="How can we help?"></textarea>
      </div>
      <button type="submit" class="btn">Send Message</button>
    </form>
  </main>

  <footer>
    <div class="footer-links">
      <a href="/about">Our Story</a> |
      <a href="/careers">Join the Team</a> |
      <a href="/contact">Contact Us</a> |
      <a href="/privacy-policy">Privacy</a>
    </div>
    <p>&copy; 2026 The Daily Grind Coffee Co. All rights reserved.</p>
  </footer>

  <script type="speculationrules">
  {
    "prerender": [
      {
        "source": "document",
        "where": {
          "and": [
            { "href_matches": "/*" },
            { "not": { "href_matches": "/logout" } }
          ]
        },
        "eagerness": "moderate"
      }
    ]
  }
  </script>

</body>

</html>
