<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popover Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        /* The Button — serves as the anchor for positioning */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            anchor-name: --trigger;
        }

        /* The Tooltip — uses Popover API, hidden by default */
        #tooltip {
            width: 140px;
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: none;
            margin: 0;

            /* CSS Anchor Positioning — place above the trigger */
            position-anchor: --trigger;
            position-area: top;
            position-try-fallbacks: flip-block;
            margin-bottom: 8px;
        }

        /* Little arrow at the bottom of the tooltip */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
    </style>
</head>
<body>

    <button id="tooltip-trigger" interesttarget="tooltip">
        Hover over me
    </button>
    <div id="tooltip" popover>I'm a popover tooltip!</div>

    <!-- No JavaScript needed! The interesttarget attribute on the button
         automatically shows the popover on hover/focus and hides it
         on mouseleave/blur via the Interest Invokers API. -->

</body>
</html>
