<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logged Out | The Daily Grind</title>
  <style>
    :root {
      --primary: #4e342e;
      --secondary: #d7ccc8;
      --accent: #ffab40;
      --text: #3e2723;
      --light: #fafafa;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      line-height: 1.6;
      color: var(--text);
      background-color: var(--light);
    }

    nav {
      background: var(--primary);
      color: white;
      padding: 1rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo { font-size: 1.5rem; font-weight: bold; letter-spacing: 1px; }

    .container {
      max-width: 500px;
      margin: 100px auto;
      padding: 0 20px;
      text-align: center;
    }

    h1 { color: var(--primary); margin-bottom: 15px; }

    .btn {
      display: inline-block;
      background: var(--primary);
      color: white;
      padding: 12px 25px;
      text-decoration: none;
      border-radius: 5px;
      margin-top: 20px;
      transition: background 0.3s;
    }
    .btn:hover { background: #3e2723; }

    footer { background: var(--secondary); text-align: center; padding: 40px 20px; position: fixed; bottom: 0; width: 100%; }
    .footer-links { margin-bottom: 20px; }
    .footer-links a { margin: 0 10px; color: var(--text); text-decoration: none; font-size: 0.85rem; }
  </style>
</head>

<body>
  <nav>
    <div class="logo"><a href="/" style="color:white;text-decoration:none">THE DAILY GRIND</a></div>
  </nav>

  <main class="container">
    <h1>You've been logged out</h1>
    <p>Thanks for stopping by. We hope to see you again soon.</p>
    <a href="/" class="btn">Back to Home</a>
  </main>

  <footer>
    <div class="footer-links">
      <a href="/about">Our Story</a> |
      <a href="/contact">Contact Us</a> |
      <a href="/privacy-policy">Privacy</a>
    </div>
    <p>&copy; 2026 The Daily Grind Coffee Co. All rights reserved.</p>
  </footer>
</body>
</html>
