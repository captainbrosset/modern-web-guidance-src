<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Data Application</title>
</head>

<body>
  <h1>Data Application</h1>

  <button id="btn-fetch">Fetch Data</button>

  <script>
    document.getElementById('btn-fetch').addEventListener('click', () => {
      // Negative: Critical data fetch is incorrectly set to 'low'
      fetch('/api/data', {
        priority: 'low'
      });

      // Negative: Analytics fetch is missing priority: 'low' 
      // AND uses deprecated 'importance'
      fetch('/api/analytics', {
        method: 'POST',
        importance: 'high'
      });
    });
  </script>
</body>

</html>
