<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Product Page</title>
</head>

<body>
  <h1>Product Landing Page</h1>

  <img src="hero-lcp.jpg" alt="Product Hero" loading="lazy" width="600" height="400">

  <div class="gallery">
    <img src="gallery-main.jpg" alt="Main Gallery Image" fetchpriority="auto" width="300" height="200">

    <img src="gallery-alt.jpg" alt="Secondary Gallery Image" fetchpriority="high" importance="high" width="300"
      height="200" style="display: none;">
  </div>

  <nav>
    <ul>
      <li>Products
        <div class="mega-menu" style="display: none;">
          <img src="mega-menu-promo.jpg" alt="Special Offer" fetchpriority="high" width="300" height="150">
        </div>
      </li>
    </ul>
  </nav>

  <div style="margin-top: 2000px;">
    <img src="footer-logo.png" alt="Footer" fetchpriority="low" loading="lazy" width="200" height="100">
    <img src="footer-image-2.jpg" alt="Footer 2" fetchpriority="high" width="200" height="100">
  </div>
</body>

</html>
