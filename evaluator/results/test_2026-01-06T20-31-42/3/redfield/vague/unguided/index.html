<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <button id="tooltip-trigger" class="trigger-btn" aria-describedby="tooltip">
            Hover or Focus me
        </button>
        <div id="tooltip" class="tooltip">
            Detailed information about this action.
        </div>
    </div>

    <script type="module" src="script.js"></script>

</body>
</html>
