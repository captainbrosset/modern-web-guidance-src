<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            position: relative;
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            
            /* Anchor Positioning */
            anchor-name: --tooltip-trigger;
        }

        /* The Tooltip (Popover) */
        #tooltip {
            /* Popover/Anchor positioning styles */
            position-anchor: --tooltip-trigger;
            position-area: top; /* Shorthand for 'top center' */
            margin-bottom: 10px; /* Space between trigger and tooltip */
            width: max-content;
            margin-inline: auto;
            position-try-fallbacks: flip-block;

            /* Visual styles */
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            border: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            
            /* Animation support */
            transition: opacity 0.2s, display 0.2s allow-discrete;
            opacity: 0;
        }

        #tooltip:popover-open {
            opacity: 1;
        }

        /* Little arrow using a pseudo-element on the tooltip */
        /* Note: Anchor positioning might make arrow positioning tricky without more complex CSS, 
           keeping it simple for now or adjusting if needed. 
           With position-area, the arrow logic simplifies if we assume top placement, 
           but robust arrow positioning often requires more math or `anchor-center`.
           For this specific modernize task, standard tooltip look is good.
        */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
    </style>
    
    <!-- Polyfills -->
    <script>
        // Interest Invokers Polyfill
        if (!HTMLButtonElement.prototype.hasOwnProperty("interestForElement")) {
            const script = document.createElement('script');
            script.src = "https://unpkg.com/interestfor@1.0.7/src/interestfor.min.js";
            document.head.appendChild(script);
        }

        // Popover Polyfill
        if (!HTMLDivElement.prototype.hasOwnProperty("popover")) {
            const script = document.createElement('script');
            script.src = "https://unpkg.com/@oddbird/popover-polyfill@0.6.1/dist/popover.min.js";
            script.type = "module"; // Popover polyfill is often a module
            document.head.appendChild(script);
        }

        // CSS Anchor Positioning Polyfill
        if (!("positionAnchor" in document.documentElement.style) && !CSS.supports("position-anchor: --foo")) {
            const script = document.createElement('script');
            script.src = "https://unpkg.com/@oddbird/css-anchor-positioning@0.8.0/dist/css-anchor-positioning.js";
            script.type = "module";
            document.head.appendChild(script);
        }
    </script>
</head>
<body>

    <div class="container">
        <!-- 
            interestfor: automatically handles hover/focus/long-press behavior
            popover: makes it a popover element
        -->
        <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        
        <!-- Popover element -->
        <div id="tooltip" popover="hint">I'm a modern popover tooltip!</div>
    </div>

</body>
</html>
