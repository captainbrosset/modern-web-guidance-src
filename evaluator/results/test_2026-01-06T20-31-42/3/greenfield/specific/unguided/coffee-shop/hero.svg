<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3e2723;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1b0000;stop-opacity:1" />
    </linearGradient>
    <filter id="steamBlur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="15" />
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg)" />
  <!-- Table -->
  <rect y="450" width="800" height="150" fill="#5d4037" />
  <!-- Saucer -->
  <ellipse cx="400" cy="460" rx="140" ry="40" fill="#d7ccc8" />
  <!-- Cup -->
  <path d="M 280 350 Q 280 480 400 480 Q 520 480 520 350 L 520 280 L 280 280 Z" fill="#ffffff" />
  <ellipse cx="400" cy="280" rx="120" ry="30" fill="#6d4c41" /> <!-- Coffee Liquid -->
  <!-- Handle -->
  <path d="M 520 300 Q 580 300 580 360 Q 580 420 520 420" stroke="#ffffff" stroke-width="25" fill="none" />
  <!-- Steam -->
  <path d="M 380 200 Q 400 150 380 100" stroke="#ffffff" stroke-width="10" stroke-opacity="0.3" fill="none" filter="url(#steamBlur)" />
  <path d="M 420 220 Q 440 170 420 120" stroke="#ffffff" stroke-width="10" stroke-opacity="0.3" fill="none" filter="url(#steamBlur)" />
  <text x="50%" y="550" text-anchor="middle" font-family="serif" font-size="24" fill="#a1887f">Premium Coffee Experience</text>
</svg>
