<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brew & Bloom - Premium Coffee Experience</title>
    <meta name="description" content="Experience the finest artisanal coffee at Brew & Bloom.">
    <link rel="stylesheet" href="styles.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script type="module" src="app.js"></script>
</head>
<body>

    <main class="hero">
        <div class="hero-content">
            <h1 class="hero-title">Brew & Bloom</h1>
            <p class="hero-subtitle">Where every cup is a masterpiece of flavor and craft.</p>
        </div>

        <div class="hero-image-wrapper">
             <!-- Adaptive Loading: 'loading-placeholder' points to the low-res version -->
            <img class="hero-img" 
                 src="https://placehold.co/1200x800/2c241b/white?text=Coffee+High+Res" 
                 loading-placeholder="https://placehold.co/1200x800/8c6239/white?text=Coffee+Low+Res"
                 alt="Artisanal Latte on Wooden Table"
                 width="1200" height="800">
        </div>
    </main>

    <section class="details">
        <h2>Our Signature Blend</h2>
        <p>Discover the rich notes of caramel and hazelnut in our house blend.</p>
        
        <!-- Interest Invoker: Triggers popover on hover -->
        <button class="btn-primary" interestfor="ingredients-popover">
            View Ingredients
        </button>

        <!-- Popover element -->
        <div id="ingredients-popover" popover="hint">
            <h3>Ingredients</h3>
            <ul style="list-style: none; padding: 0; margin-top: 1rem;">
                <li>☕ 100% Arabica Beans</li>
                <li>🥛 Fresh Organic Milk</li>
                <li>🍯 Dash of Vanilla Syrup</li>
                <li>✨ Sprinkle of Cinnamon</li>
            </ul>
        </div>
    </section>

</body>
</html>
