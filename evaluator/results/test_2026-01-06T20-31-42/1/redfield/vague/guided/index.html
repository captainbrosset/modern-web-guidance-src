<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Declarative Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            position: relative;
            display: inline-block;
        }

        /* The Button */
        .tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            anchor-name: --tooltip-trigger;
        }

        /* The Tooltip (Declarative) */
        [popover] {
            position-anchor: --tooltip-trigger;
            position-area: top;
            width: max-content;
            margin: 0;
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: none; /* Reset default popover border */
            position-try-fallbacks: flip-block;
        }

        /* Arrow using popover API might need extra handling or just use simple CSS if supported */
        /* For this demo, we'll keep it simple as anchor positioning arrow support varies */
    </style>
</head>
<body>

    <div class="container">
        <!-- 
            interestfor: Connects this button to the popover for hover/focus behavior
            popovertarget is NOT needed for hover tooltips when using interestfor
        -->
        <button class="tooltip-trigger" interestfor="my-tooltip">Hover over me</button>
        
        <!-- popover="hint": Semantically appropriate for tooltips -->
        <div id="my-tooltip" popover="hint">I'm a modern declarative tooltip!</div>
    </div>

    <!-- Polyfills with Feature Detection -->
    <script>
        // Interest Invokers Polyfill
        if (!HTMLButtonElement.prototype.hasOwnProperty("interestForElement")) {
            const script = document.createElement('script');
            script.src = 'js/vendor/interestfor.min.js';
            document.head.appendChild(script);
        }

        // Popover API Polyfill
        if (!HTMLDivElement.prototype.hasOwnProperty("popover")) {
            const script = document.createElement('script');
            script.src = 'js/vendor/popover.min.js';
            document.head.appendChild(script);
        }

        // CSS Anchor Positioning Polyfill
        if (!("positionAnchor" in document.documentElement.style)) {
            const script = document.createElement('script');
            script.src = 'js/vendor/css-anchor-positioning.js'; // Note: this might be a larger module in verify
            // For the Oddbird polyfill, we might need to load it slightly differently depending on usage
            // But basic script inclusion should work for the polyfill to patch support
            document.head.appendChild(script);
        }
    </script>

</body>
</html>
