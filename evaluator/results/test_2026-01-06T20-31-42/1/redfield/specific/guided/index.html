<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperative Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            position: relative;
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            anchor-name: --tooltip-trigger;
        }

        /* The Tooltip (Hidden by default) */
        #tooltip {
            /* Position attributes */
            position-anchor: --tooltip-trigger;
            position-area: top;
            margin-inline: auto;
            position-try-fallbacks: flip-block;

            /* Visual styles */
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: none;
            /* Reset default popover border */
        }

        /* Arrow using the new anchor positioning API not easily supported yet without complex clipping paths or extra elements. 
           Simplifying to remove the arrow for this demo as it requires more complex anchor-center logic. */
    </style>
</head>

<body>

    <div class="container">
        <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        <div id="tooltip" popover="hint">I'm a modern tooltip!</div>
    </div>

    <script>
        // Polyfill loading
        if (!("interestForElement" in HTMLButtonElement.prototype)) {
            const script = document.createElement("script");
            script.src = "./scripts/interestfor.min.js";
            document.head.appendChild(script);
        }

        if (!("popover" in document.createElement("div"))) {
            const script = document.createElement("script");
            script.src = "./scripts/popover.min.js";
            script.type = "module";
            document.head.appendChild(script);
        }

        if (!("positionAnchor" in document.documentElement.style)) {
            const script = document.createElement("script");
            script.src = "./scripts/css-anchor-positioning.js";
            script.type = "module";
            document.head.appendChild(script);
        }
    </script>

</body>

</html>
