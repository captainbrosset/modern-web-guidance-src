<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --tooltip-bg: #1e293b;
            --tooltip-text: #ffffff;
        }

        body {
            font-family: 'Outfit', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .container {
            position: relative;
        }

        /* The Button */
        #tooltip-trigger {
            anchor-name: --my-trigger;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
            color: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.2), 0 2px 4px -1px rgba(99, 102, 241, 0.1);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.025em;
        }

        #tooltip-trigger:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3), 0 4px 6px -2px rgba(99, 102, 241, 0.15);
        }

        #tooltip-trigger:active {
            transform: translateY(0);
        }

        /* The Tooltip */
        [popover] {
            position-anchor: --my-trigger;
            position-area: top;
            margin-bottom: 20px; /* Offset from the button */
            
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            background-color: var(--tooltip-bg);
            color: var(--tooltip-text);
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            
            /* Enhanced Animation */
            opacity: 0;
            transform: translateY(5px) scale(0.95);
            transition: 
                opacity 0.2s ease-out, 
                transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                display 0.2s allow-discrete;
        }

        /* Popover Open State */
        [popover]:popover-open {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* Starting style for entry animation */
        @starting-style {
            [popover]:popover-open {
                opacity: 0;
                transform: translateY(5px) scale(0.95);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- interestfor connects the button to the popover via ID -->
        <button id="tooltip-trigger" interestfor="my-tooltip">
            Hover for Magic
        </button>
        
        <!-- popover="hint" is designed for tooltips -->
        <div id="my-tooltip" popover="hint">
            ✨ Native Web Tooltip ✨
        </div>
    </div>

    <!-- Feature Detection & Polyfill Loading -->
    <script>
        // 1. Interest Invokers Polyfill
        if (!HTMLButtonElement.prototype.hasOwnProperty("interestForElement")) {
            console.log('Loading Interest Invokers Polyfill');
            const script = document.createElement('script');
            script.src = './vendor/interestfor.min.js';
            document.head.appendChild(script);
        }

        // 2. Popover API Polyfill
        if (!HTMLElement.prototype.hasOwnProperty("popover")) {
            console.log('Loading Popover API Polyfill');
            const script = document.createElement('script');
            script.src = './vendor/popover.min.js';
            document.head.appendChild(script);
        }

        // 3. CSS Anchor Positioning Polyfill
        // Simple check for position-anchor support
        if (!CSS.supports("position-anchor: --foo")) {
            console.log('Loading CSS Anchor Positioning Polyfill');
            const script = document.createElement('script');
            // The oddbird polyfill requires type="module" or handling, but standard script tag should work for the dist bundle
            script.src = './vendor/css-anchor-positioning.js';
            // Some polyfills might need type module, but let's try standard first as per common distribution
            document.head.appendChild(script); 
        }
    </script>
</body>
</html>
