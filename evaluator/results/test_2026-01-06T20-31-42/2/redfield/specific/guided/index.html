<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            position: relative;
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            
            /* Anchor Positioning */
            anchor-name: --trigger;
        }

        /* The Tooltip */
        #tooltip {
            /* Reset/Base Styles */
            margin: 0;
            border: none;
            padding: 8px;
            border-radius: 6px;
            background-color: #333;
            color: #fff;
            font-size: 14px;
            width: 140px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);

            /* Anchor Positioning */
            position-anchor: --trigger;
            position-area: top;
            position-try-fallbacks: flip-block;
            margin-bottom: 10px; /* Slight gap */
        }
        
        /* Arrow using standard CSS (simplified for demo, usually harder with simple popover without complex calculations or anchor-center) */
        /* For this demo, we'll omit the complex arrow positioning as it requires more advanced anchor usage or nested elements, 
           but we can keep a simple one if we assume it's always on top. 
           However, position-try-fallbacks makes sticky arrows hard without `anchor-center`. 
           Let's keep it simple as requested. */

    </style>
</head>
<body>

    <div class="container">
        <!-- interestfor connects this button to the popover for hover behavior -->
        <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>
        
        <!-- popover="hint" gives it tooltip semantics (light dismiss, non-modal) -->
        <div id="tooltip" popover="hint">I'm a modern tooltip!</div>
    </div>

    <!-- Polyfills -->
    <script>
        // Feature detection and optional loading
        if (!HTMLButtonElement.prototype.hasOwnProperty("interestForElement")) {
            const script = document.createElement('script');
            script.src = 'js/vendor/interestfor.min.js';
            document.head.appendChild(script);
        }
        
        if (!HTMLDivElement.prototype.hasOwnProperty("popover")) {
            const script = document.createElement('script');
            script.src = 'js/vendor/popover.min.js';
            document.head.appendChild(script);
        }

        if (!('positionAnchor' in document.documentElement.style)) {
            const script = document.createElement('script');
            script.src = 'js/vendor/css-anchor-positioning.js';
            // Polyfill needs to process styles
            script.type = 'module'; 
            document.head.appendChild(script);
        }
    </script>

</body>
</html>
