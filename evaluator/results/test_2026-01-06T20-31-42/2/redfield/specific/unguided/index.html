<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Popover Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            position: relative; /* Kept for layout, though less needed for positioning now */
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            anchor-name: --trigger;
        }

        /* The Tooltip (Popover) */
        #tooltip {
            /* Popover/Anchor base styles */
            position-anchor: --trigger;
            position-area: top;
            margin: 0;
            
            /* Visuals */
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            border: none; /* Remove default popover border */
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            
            /* Entrance animation */
            transition: opacity 0.2s allow-discrete, overlay 0.2s allow-discrete;
            opacity: 0;
        }

        #tooltip:popover-open {
            opacity: 1;
        }
        
        /* Starting style for the popover animation */
        @starting-style {
            #tooltip:popover-open {
                opacity: 0;
            }
        }

        /* Little arrow at the bottom of the tooltip */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- added interesttarget -->
        <button id="tooltip-trigger" interesttarget="tooltip">Hover over me</button>
        
        <!-- added popover attribute -->
        <div id="tooltip" popover>I'm a modern popover tooltip!</div>
    </div>

    <!-- Script removed! -->

</body>
</html>
