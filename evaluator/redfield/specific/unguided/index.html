<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tooltip Demo</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            /* Container helps group them visually, but positioning is now handled by anchors */
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            
            /* Define the anchor name for the tooltip to reference */
            anchor-name: --trigger;
        }

        /* The Tooltip */
        #tooltip {
            /* Popover API handles display (hidden by default) */
            
            /* Anchor Positioning */
            position-anchor: --trigger;
            position: absolute; /* Popovers are fixed/absolute */
            
            /* Position above the trigger */
            bottom: anchor(top);
            left: anchor(center);
            
            /* Spacing from the trigger */
            margin: 0;
            margin-bottom: 15px; /* Space for the arrow + gap */
            
            /* Center horizontally relative to the anchor center */
            transform: translateX(-50%);

            /* Styling */
            width: 140px;
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Little arrow at the bottom of the tooltip */
        #tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: #333 transparent transparent transparent;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- interesttarget connects the button to the tooltip for hover/focus behavior -->
        <button id="tooltip-trigger" interesttarget="tooltip">Hover over me</button>
        
        <!-- popover attribute makes it a Popover element -->
        <div id="tooltip" popover>I'm a modern tooltip!</div>
    </div>

</body>
</html>
