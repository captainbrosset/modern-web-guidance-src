<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popover API Tooltip Demo</title>
    <!-- Polyfills for cross-browser support -->
    <script src="https://unpkg.com/@oddbird/popover-polyfill" crossorigin="anonymous" defer></script>
    <script src="https://unpkg.com/@oddbird/css-anchor-positioning" crossorigin="anonymous" defer></script>
    <script src="https://unpkg.com/interestfor" crossorigin="anonymous" defer></script>

    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .container {
            position: relative;
            display: inline-block;
        }

        /* The Button */
        #tooltip-trigger {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            anchor-name: --tooltip-trigger;
        }

        /* The Tooltip (Popover API) */
        #tooltip {
            /* Anchor Positioning */
            position-anchor: --tooltip-trigger;
            position-area: top;
            margin: 0;
            /* Reset default margins */
            margin-bottom: 10px;
            /* Spacing */

            /* Visual Styling */
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 8px;
            border-radius: 6px;
            border: none;
            /* Reset default popover border */
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);

            /* Popover transition (optional but nice) */
            opacity: 0;
            transition: opacity 0.2s allow-discrete;
        }

        #tooltip:popover-open {
            opacity: 1;
        }

        /* Arrow using ::after is tricky with basic anchor positioning without extra heavy lifting, 
           simpler to omit for this pure CSS demo or keep it simple. 
           We'll try to keep the arrow if possible, but standard anchor positioning doesn't auto-position the arrow easily yet without advanced tricks.
           We'll keep the visual style similar but maybe sans-arrow for simplicity unless I can anchor it easily.
           Actually, let's keep it simple first. */
    </style>
</head>

<body>

    <div class="container">
        <!-- interestfor connects the trigger to the popover for hover behavior -->
        <button id="tooltip-trigger" interestfor="tooltip">Hover over me</button>

        <!-- popover="hint" gives it tooltip semantics and behavior -->
        <div id="tooltip" popover="hint">I'm a modern native tooltip!</div>
    </div>

</body>

</html>
