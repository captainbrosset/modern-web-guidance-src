<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Group Element Transitions</title>
    <style>
      /* CORE: All list items share the same transition */
      .item {
        view-transition-class: list-item;
      }

      /* Allow non-transitioned elements to be interactive */
      ::view-transition {
        pointer-events: none;
      }
      /* Disable the default animation on the root */
      :root {
        view-transition-name: none;
      }

      ::view-transition-group(.list-item) {
        animation-duration: 0.5s;
        animation-timing-function: ease-in-out;
      }
      @media (prefers-reduced-motion: reduce) {
        ::view-transition-group(*),
        ::view-transition-old(*),
        ::view-transition-new(*) {
          animation: none !important;
        }
      }

      ::view-transition-new(.list-item):only-child {
        animation-name: slide-in;
        animation-duration: 1s;
      }
      ::view-transition-old(.list-item):only-child {
        animation-name: slide-out;
        animation-duration: 1s;
      }

      @keyframes slide-in {
        from {
          translate: -100vw 0;
        }
      }
      @keyframes slide-out {
        to {
          translate: -100vw 0;
        }
      }

      /* DEMO: Styling */
      body {
        font-family: monospace;
        max-width: 600px;
        margin: 20px auto;
        padding: 0 20px;
        text-align: center;
      }

      button {
        padding: 8px 16px;
        background: #0066cc;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }

      #list {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        margin-top: 20px;
      }

      .item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px;
        background: #f0f0f0;
        border: 1px solid #ccc;
        border-radius: 4px;
      }

      .item button {
        padding: 4px 10px;
        font-size: 12px;
        background: #cc3333;
      }
    </style>
  </head>

  <body>
    <h1>Group Element Transitions</h1>
    <button onclick="add()">Add Item</button>
    <button onclick="shuffle()">Shuffle</button>
    <ul id="list"></ul>

    <script>
      function getRandomName() {
        const length = Math.floor(Math.random() * 20) + 4;
        const chars = "abcdefghijklmnopqrstuvwxyz ";
        return Array.from(
          { length },
          () => chars[Math.floor(Math.random() * chars.length)],
        ).join("");
      }

      let items = [
        { id: 1, name: getRandomName() },
        { id: 2, name: getRandomName() },
        { id: 3, name: getRandomName() },
      ];
      let nextId = 4;

      /* CORE: Wrap list update in view transition */
      function render() {
        if (!document.startViewTransition) {
          update();
          return;
        }
        document.startViewTransition(() => update());
      }

      /* DEMO: Update DOM */
      function update() {
        const html = items
          .map(
            (item) => `
        <li class="item" style="view-transition-name: item-${item.id}">
          <span>${item.name}</span>
          <button onclick="remove(${item.id})">Remove</button>
        </li>
      `,
          )
          .join("");
        document.getElementById("list").innerHTML = html;
      }

      /* DEMO: Add/Remove items */
      function add() {
        items = [{ id: nextId, name: getRandomName() }, ...items];
        nextId++;
        render();
      }

      function remove(id) {
        const index = items.findIndex((item) => item.id === id);
        if (index !== -1) items.splice(index, 1);
        render();
      }
      function shuffle() {
        for (let i = items.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [items[i], items[j]] = [items[j], items[i]];
        }
        render();
      }

      update();
    </script>
  </body>
</html>
