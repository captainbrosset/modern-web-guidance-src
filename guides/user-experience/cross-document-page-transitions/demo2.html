<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Page 2</title>
  <style>
    /* CORE: View Transitions API */
    @view-transition {
      navigation: auto;
    }

    ::view-transition-old(root) {
      animation: fade-out 0.4s ease-out forwards;
    }

    ::view-transition-new(root) {
      animation: fade-in 0.4s ease-out forwards;
    }

    @keyframes fade-out {
      to {
        opacity: 0;
      }
    }

    @keyframes fade-in {
      from {
        opacity: 0;
      }
    }

    /* DEMO: Styling */
    body {
      font-family: monospace;
      max-width: 500px;
      margin: 50px auto;
      padding: 0 20px;
      text-align: center;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #0066cc;
      color: white;
      text-decoration: none;
      border-radius: 4px;
    }
  </style>
</head>

<body>
  <h1>Page 2</h1>
  <p>Cross-document navigation with view transitions.</p>
  <a href="demo1.html">← Go to Page 1</a>
</body>

</html>
