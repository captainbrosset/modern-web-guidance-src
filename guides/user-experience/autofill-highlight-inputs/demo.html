<!DOCTYPE html>
<html lang="en">

<head>
  <title>Highlight :autofill inputs</title>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
  * {
    font-family: sans-serif;
  }
  input {
    border: 2px solid;
    border-color: #cccccc;
    border-radius: 2px;
    margin: 0 0 2rem 0;
    padding: 0.5rem;
  }
  input#submit {
    cursor: pointer;
    font-size: 16px;
    font-weight: 800;
  }
  label {
    display: block;
    font-weight: 500;
    margin: 0 0 0.5rem 0;
  }
  input:autofill,
  input:-webkit-autofill,
  input:-webkit-autofill,
  input:-webkit-autofill:hover,
  input:-webkit-autofill:focus {
  /* box-shadow can be used to customize the background if required: background-color cannot be overridden directly */
  /* box-shadow: 0 0 0 100vmax #efe inset; */
    border-color: green;
    outline: none;
  }
  </style>

</head>

<body>

  <main>

    <form id="form" name="form">

      <h1>Name form</h1>

      <section>
        <label for="name">Name</label>
        <input id="name" name="name" autocomplete="name" maxlength="100" pattern="[\p{L} \-\.]+" required>
      </section>

      <input type="submit" value="Submit" id="submit">

    </form>

  </main>

</body>

</html>
