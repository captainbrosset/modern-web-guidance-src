<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Shapes Demo</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background-color: #f0f0f0;
  }
  .custom-shape {
    width: 220px;
    height: 220px;
    background: red;
    mask-image: url('heart.svg');
    mask-size: contain;
    mask-repeat: no-repeat;
    mask-position: center;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    font-weight: bold;
    color: white;
    font-size: 32px;
    padding: 20px;
  }
</style>
</head>
<body>
  <div class="custom-shape">
    This text is clipped by the heart!
  </div>
</body>
</html>
