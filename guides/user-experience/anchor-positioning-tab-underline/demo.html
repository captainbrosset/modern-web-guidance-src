<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anchor Positioning Tab Underline</title>
    <style>
      /* Demo adapted from: https://codepen.io/t_afif/pen/JoPOZNg */
      ul {
        padding: 0;
        margin: 0;
        list-style: none;
        display: flex;
        gap: 0.5rem;
        font-size: 2.2rem;
      }
      ul::before {
        content: '';
        position: absolute;
        position-anchor: --active;
        inset-block-start: calc(anchor(bottom) + .1lh);
        inset-inline-start: anchor(left);
        inset-inline-end: anchor(right);
        height: 0.25lh;
        background: red;
        @media (prefers-reduced-motion: no-preference){
          transition: inset ease-in-out .2s;
        }
      }

      ul li.active {
        anchor-name: --active;
        color: red;
        @supports not (position-anchor: auto){
          border-bottom: .25lh red solid;
        }
      }

      ul li a {
        color: #000;
        text-decoration: none;
        font-weight: 900;
        line-height: 1.5;
        padding-inline: 0.2em;
        display: block;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2rem;
        background: #f2f2f2;
        font-family: system-ui, sans-serif;
      }

      .instructions {
        text-align: center;
        color: #555;
        max-width: 400px;
        margin: 0;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <p class="instructions">Click on any of the tabs below to see the red underline transition smoothly to the new active position.</p>
    <nav>
      <ul>
        <li class="active"><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Projects</a></li>
        <li><a href="#">Blog</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
    <script>
      const listItems = document.querySelectorAll('ul li');
      listItems.forEach(li => {
        li.addEventListener('click', (e) => {
          e.preventDefault();
          document.querySelector('li.active')?.classList.remove('active');
          li.classList.add('active');
        });
      });
    </script>
  </body>
</html>
