<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parent Styling with :has()</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 2rem;
      line-height: 1.5;
      max-width: 600px;
      margin: 0 auto;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 1.5rem;
      transition: all 0.3s ease;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
      border-left: 6px solid #ccc;
      /* Default neutral accent */
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #eee;
    }

    h3 {
      margin: 0;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    /* 
      --- PARENT STYLING LOGIC ---
      If the card contains an invalid input (after interaction),
      change the card's accent color and background.
    */

    .card:has(input:user-invalid),
    .card.has-error-fallback {
      border-left-color: #d93025;
      background-color: #fff8f8;
      box-shadow: 0 4px 12px rgba(217, 48, 37, 0.1);
    }

    /* Update the status icon */
    .status-icon::after {
      content: "✅";
    }

    .card:has(input:user-invalid) .status-icon::after,
    .card.has-error-fallback .status-icon::after {
      content: "⚠️";
    }

    /* Also style the input itself */
    input:user-invalid,
    input.user-invalid-fallback {
      border-color: #d93025;
    }

    .status-banner {
      padding: 1rem;
      background: #eee;
      margin-bottom: 1rem;
      border-radius: 4px;
    }
  </style>
</head>

<body>

  <h1>Parent Styling with :has()</h1>
  <p>Demonstrates styling a container based on the validity of its children using <code>:has(input:user-invalid)</code>.
  </p>

  <div style="margin-bottom: 1rem;">
    <label
      style="display: inline-flex; align-items: center; gap: 0.5rem; cursor: pointer; background: #f0f0f0; padding: 0.5rem 1rem; border-radius: 4px;">
      <input type="checkbox" id="force-fallback">
      <strong>Force Fallback Mode</strong> (Simulate JS fallback)
    </label>
  </div>

  <div id="fallback-status" class="status-banner">
    Checking support...
  </div>

  <!-- The Parent Container -->
  <div class="card" id="profile-card">
    <div class="header">
      <h3>User Profile</h3>
      <span class="status-icon"></span>
    </div>

    <form id="demo-form" action="#" onsubmit="event.preventDefault();" novalidate>
      <div class="form-group">
        <label for="username">Username (Required)</label>
        <input type="text" id="username" name="username" required>
      </div>
      <div class="form-group">
        <label for="email">Email (Required)</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div style="display: flex; gap: 1rem;">
        <button type="submit">Save</button>
        <button type="reset">Reset</button>
      </div>
    </form>
  </div>

  <script>
    const form = document.getElementById('demo-form');
    const card = document.getElementById('profile-card');
    const statusDiv = document.getElementById('fallback-status');
    const forceFallbackCheckbox = document.getElementById('force-fallback');

    // 1. Feature Detection & Mode Switching
    const updateFeatureState = () => {
      const supportsHas = CSS.supports('selector(:has(a))');
      const supportsUserInvalid = CSS.supports('selector(:user-invalid)');
      const forced = forceFallbackCheckbox.checked;

      useNativeLogic = supportsHas && supportsUserInvalid && !forced;

      if (useNativeLogic) {
        statusDiv.textContent = "✅ Native :has() & :user-invalid supported.";
        statusDiv.style.background = "#e6f4ea";
        statusDiv.style.color = "#137333";
        card.classList.remove('has-error-fallback');
      } else {
        const reason = forced ? "(Forced)" : "(Missing support)";
        statusDiv.textContent = `⚠️ Using JS fallback logic ${reason}.`;
        statusDiv.style.background = "#fff8e1";
        statusDiv.style.color = "#b06000";
      }

      // Reset artifacts
      form.querySelectorAll('input').forEach(input => {
        input.classList.remove('user-invalid-fallback');
        input.classList.remove('user-valid-fallback');
      });

      // Initialize
      if (!useNativeLogic) {
        UserInvalidFallback.init(form);
      }
    };

    forceFallbackCheckbox.addEventListener('change', () => {
      updateFeatureState();
    });

    // 2. The Fallback (Synced from guide.md)
    const UserInvalidFallback = (() => {
      const dirtyState = new WeakMap();

      const updateState = (input) => {
        const isValid = input.checkValidity();

        // Update both visual and ARIA state
        input.classList.toggle('user-invalid-fallback', !isValid);
        input.classList.toggle('user-valid-fallback', isValid);

        if (!isValid) {
          input.setAttribute('aria-invalid', 'true');
        } else {
          input.removeAttribute('aria-invalid');
        }
      };

      const handleEvent = (event) => {
        const input = event.target;

        if (event.type === 'reset') {
          const controls = input.elements || [];
          for (const control of controls) {
            dirtyState.delete(control);
            control.classList.remove('user-invalid-fallback');
            control.classList.remove('user-valid-fallback');
            control.removeAttribute('aria-invalid');
          }
          return;
        }

        if (!input.checkValidity) return;

        if (event.type === 'input' || event.type === 'change') {
          const state = dirtyState.get(input) || { hasInteracted: false, hasBlurred: false };
          state.hasInteracted = true;
          dirtyState.set(input, state);
          if (state.hasBlurred) {
            updateState(input);
          }
        } else if (event.type === 'blur') {
          const state = dirtyState.get(input) || { hasInteracted: false, hasBlurred: false };
          state.hasBlurred = true;
          dirtyState.set(input, state);
          if (state.hasInteracted) {
            updateState(input);
          }
        }
      };

      const init = (root = document) => {
        const nativelySupported = CSS.supports('selector(:user-invalid)');
        if (nativelySupported && !forceFallbackCheckbox.checked) return;

        root.addEventListener('blur', handleEvent, true);
        root.addEventListener('input', handleEvent);
        root.addEventListener('change', handleEvent);
        root.addEventListener('reset', handleEvent, true);
      };

      return { init };
    })();

    // 3. Specialized Application Layer (Parent Styling)
    const updateParentStyles = (target) => {
      if (useNativeLogic) return;
      const container = target.closest('.card');
      if (!container) return;
      const hasError = container.querySelector('.user-invalid-fallback');
      container.classList.toggle('has-error-fallback', !!hasError);
    };

    form.addEventListener('blur', (e) => {
      // Small timeout to ensure the fallback's capture-phase listener runs first
      setTimeout(() => updateParentStyles(e.target), 0);
    }, true);

    form.addEventListener('input', (e) => updateParentStyles(e.target));

    form.addEventListener('reset', () => {
      setTimeout(() => {
        form.querySelectorAll('.has-error-fallback').forEach(el => {
          el.classList.remove('has-error-fallback');
        });
      }, 0);
    });

    // Init
    updateFeatureState();
  </script>
</body>

</html>
