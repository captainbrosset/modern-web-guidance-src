<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Interest-Triggered Action Previews</title>
    <style>
      body {
        font: 1rem/1.5 system-ui, sans-serif;
        margin: 2rem;
      }

      .color-grid {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
      }

      .color-grid button {
        width: 3rem;
        height: 3rem;
        border: 2px solid transparent;
        border-radius: 0.375rem;
        cursor: pointer;
      }

      .color-grid button:focus-visible {
        outline: 2px solid #000;
        outline-offset: 2px;
      }

      .preview-box {
        width: 12rem;
        height: 6rem;
        border: 1px solid #ccc;
        border-radius: 0.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        transition: background-color 0.2s;
      }
    </style>
  </head>
  <body>
    <h1>Interest-Triggered Action Previews</h1>
    <p>Hover over or focus on a color swatch to preview the change.
      Click to apply it.</p>

    <div class="color-grid">
      <button
        interestfor="preview-box"
        style="background: #ef4444"
        data-color="#ef4444"
        aria-label="Red"
      ></button>
      <button
        interestfor="preview-box"
        style="background: #3b82f6"
        data-color="#3b82f6"
        aria-label="Blue"
      ></button>
      <button
        interestfor="preview-box"
        style="background: #22c55e"
        data-color="#22c55e"
        aria-label="Green"
      ></button>
    </div>

    <div id="preview-box" class="preview-box">Preview</div>

    <script>
      const previewBox = document.getElementById('preview-box');
      let appliedColor = '';

      previewBox.addEventListener('interest', (e) => {
        previewBox.style.backgroundColor = e.source.dataset.color;
      });

      previewBox.addEventListener('loseinterest', () => {
        previewBox.style.backgroundColor = appliedColor;
      });

      document.querySelectorAll('.color-grid button').forEach((btn) => {
        btn.addEventListener('click', () => {
          appliedColor = btn.dataset.color;
          previewBox.style.backgroundColor = appliedColor;
        });
      });
    </script>
  </body>
</html>
